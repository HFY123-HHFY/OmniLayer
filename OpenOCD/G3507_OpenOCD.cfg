# MSPM0G3507 + CMSIS-DAP OpenOCD config.
# 参考 TI ti_mspm0 脚本机制实现，但不依赖 My_openocd 目录运行。

source [find interface/cmsis-dap.cfg]
transport select swd
source [find target/swj-dp.tcl]

if { [info exists ADAPTER_KHZ] } {
	adapter speed $ADAPTER_KHZ
} else {
	# 默认使用实测更稳的 6MHz，任务里可显式覆写到更高频率。
	adapter speed 6000
}

# 固定常见 CMSIS-DAP VID/PID，降低多探针/识别抖动风险。
cmsis-dap vid_pid 0x0d28 0x0204

if { [info exists CHIPNAME] } {
	set _CHIPNAME $CHIPNAME
} else {
	set _CHIPNAME mspm0g3507
}

if { [info exists DAP_SWD_ID] } {
	set _DAP_SWD_ID $DAP_SWD_ID
} else {
	# TI MSPM0 目标脚本默认 SWD DAP ID。
	set _DAP_SWD_ID 0x2ba01477
}

if { [info exists WORKAREABASE] } {
	set _WORKAREABASE $WORKAREABASE
} else {
	set _WORKAREABASE 0x20000000
}

if { [info exists WORKAREASIZE] } {
	set _WORKAREASIZE $WORKAREASIZE
} else {
	# 按 TI 脚本默认最小工作区，必要时可在命令行覆写为更大值。
	set _WORKAREASIZE 0x400
}

swj_newdap $_CHIPNAME cpu -irlen 4 -expected-id $_DAP_SWD_ID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -dap $_CHIPNAME.dap -endian little

# 与 TI 方案一致：在检查阶段先打开低功耗调试访问，避免部分状态下访问慢或失败。
proc _mspm0_enable_low_power_mode {} {
	catch { $::_CHIPNAME.dap apreg 4 0x00 0x104008 }
	catch { $::_CHIPNAME.dap apreg 4 0xF0 0x01 }
	catch { $::_CHIPNAME.dap apreg 4 0x00 0x100008 }
}

$_TARGETNAME configure -event examine-start { _mspm0_enable_low_power_mode }
$_TARGETNAME configure -work-area-phys $_WORKAREABASE -work-area-size $_WORKAREASIZE -work-area-backup 0

# 与 TI 目标脚本对齐：主区/非主区/数据区都注册为 mspm0 driver，提升算法匹配正确性。
set _FLASHNAME $_CHIPNAME.flash
flash bank $_FLASHNAME.main mspm0 0x00000000 0 0 0 $_TARGETNAME
flash bank $_FLASHNAME.nonmain mspm0 0x41c00000 0 0 0 $_TARGETNAME
flash bank $_FLASHNAME.data mspm0 0x41d00000 0 0 0 $_TARGETNAME

cortex_m reset_config sysresetreq
reset_config none separate
