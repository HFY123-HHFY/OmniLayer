# STM32F103 + DAP-Link(OpenOCD CMSIS-DAP) 配置。
#
# 维护说明：
# 1) ADAPTER_KHZ 为统一烧录速率宏；
# 2) 默认值为 1MHz（当前环境实测最快且稳定）；
# 3) 如需临时覆盖，可在命令行传入：
#    openocd -c "set ADAPTER_KHZ 2000" -f OpenOCD/F103_OpenOCD.cfg ...
#
# 实测结论（当前探针+板卡，含 verify）：
# - 1MHz: 推荐，稳定且总体最快；
# - 2MHz: 可用，但偶尔不稳定；
# - 4/8MHz: 不稳定，烧录失败率高。

source [find interface/cmsis-dap.cfg]  ; # 加载 CMSIS-DAP 接口配置文件
transport select swd               ; # 选择 SWD 作为传输协议

if { ![info exists ADAPTER_KHZ] } {
    set ADAPTER_KHZ 1000           ; # 设置默认烧录速率为 1MHz
}
adapter speed $ADAPTER_KHZ         ; # 应用烧录速率

source [find target/stm32f1x.cfg]  ; # 加载 STM32F1 系列目标配置文件

reset_config none separate          ; # 配置复位模式为 none separate
